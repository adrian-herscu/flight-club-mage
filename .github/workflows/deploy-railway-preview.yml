name: Deploy Preview to Railway (Wasp)

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: railway-preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    env:
      WASP_VERSION: "0.21"
      PREVIEW_CLIENT_URL: ${{ secrets.RAILWAY_PREVIEW_CLIENT_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.12"

      - name: Ensure preview secrets exist
        run: |
          if [ -z "${{ secrets.RAILWAY_TOKEN }}" ]; then
            echo "Missing secret: RAILWAY_TOKEN"
            exit 1
          fi
          if [ -z "${{ secrets.RAILWAY_PREVIEW_PROJECT_ID }}" ]; then
            echo "Missing secret: RAILWAY_PREVIEW_PROJECT_ID"
            echo "Create a separate Railway project for previews and store its ID in this secret."
            exit 1
          fi
          if [ -z "${{ secrets.RAILWAY_PREVIEW_CLIENT_URL }}" ]; then
            echo "Missing secret: RAILWAY_PREVIEW_CLIENT_URL"
            echo "Set it to the public URL of the preview client service (for example https://your-preview-client.up.railway.app)."
            exit 1
          fi

      - name: Install Wasp CLI
        run: npm i -g @wasp.sh/wasp-cli@$WASP_VERSION

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy preview via Wasp
        run: wasp deploy railway deploy flight-club-mage-preview --existing-project-id ${{ secrets.RAILWAY_PREVIEW_PROJECT_ID }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- railway-preview-url -->'
            const body = `${marker}\n✅ Preview deployed\n\n🌐 ${process.env.PREVIEW_CLIENT_URL}\n\n🔁 Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            })

            const existing = comments.find(c => c.user?.type === 'Bot' && c.body?.includes(marker))

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              })
            }
        env:
          PREVIEW_CLIENT_URL: ${{ env.PREVIEW_CLIENT_URL }}
